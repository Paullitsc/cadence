# master_resume.example.yaml — documented template for master_resume.yaml
#
# This tagged YAML is the SINGLE SOURCE OF TRUTH for résumé tailoring (Phase 2).
# Every bullet is an object with `text`, `tags`, and `metrics`. The tailoring step
# only ever selects / reorders / lightly rephrases these REAL bullets — it never
# invents experience, metrics, employers, or skills.
#
# Copy this to master_resume.yaml and replace every value with your real content,
# then set `placeholder: false`. Keep the shape; add/remove entries freely.

placeholder: true            # set false once real content is in place

# --- Identity (rendered verbatim into the résumé header; all real) ---
name: Jane Placeholder
email: jane.placeholder@example.com
phone: "+1-555-0100"
location: City, Country
links:
  linkedin: https://www.linkedin.com/in/example
  github: https://github.com/example
  website: https://example.com

# One-line professional summary — REAL, factual. Kept short; rendered as-is.
summary: >-
  Computer science student focused on backend and distributed systems.

# Optional citizenship line, appended to the summary and tailored PER JOB (not
# just rendered verbatim like the rest of this file): `citizenship` is used for
# every role; `citizenship_canada` — if set — replaces it for roles whose
# location reads as Canadian (see resume/matching.py:is_canadian_job). Leave
# both unset to omit a citizenship line entirely.
citizenship: US Citizen
citizenship_canada: US and Canadian Citizen

# --- Education (rendered verbatim; all real) ---
education:
  - institution: Placeholder University
    area: Computer Science
    degree: BSc
    location: City, Country
    start_date: "2023-09"        # YYYY-MM (RenderCV date format)
    end_date: "2027-05"
    highlights:
      - "GPA 3.9/4.0 — real, factual highlight only"

# --- Experiences: each bullet is text + tags + metrics ---
experiences:
  - company: Placeholder Labs
    # optional `url:` makes the company name a blue clickable title (same as projects).
    # url: https://example.com
    role: Software Engineer Intern
    location: Remote
    start_date: "2025-05"
    end_date: "2025-08"
    bullets:
      - text: "Built a data pipeline processing 2M events/day using Python and Kafka."
        tags: [backend, data, python, kafka, distributed-systems]
        metrics: true          # true if the bullet contains a concrete number
      - text: "Wrote integration tests that cut a recurring flaky-test class to zero."
        tags: [testing, python, reliability]
        metrics: false

  - company: Placeholder Startup
    role: Backend Developer (Part-time)
    location: City, Country
    start_date: "2024-09"
    end_date: "2025-04"
    bullets:
      - text: "Designed a REST API in Flask serving 50k requests/day."
        tags: [backend, python, flask, api]
        metrics: true

# --- Projects (same bullet shape) ---
# `url:` makes the project NAME a clickable link in the rendered PDF.
# You can also put Markdown links [text](https://...) INSIDE any bullet text —
# they render as clickable PDF links, and tailoring preserves them exactly
# (a rephrase that drops or alters a link is rejected → verbatim fallback).
projects:
  - name: Placeholder Project
    url: https://github.com/example/placeholder
    start_date: "2024-01"     # optional; "YYYY-MM" or "present" (shown like Resume.tex)
    end_date: present
    bullets:
      - text: "Implemented a SQL query planner in Java for a toy database ([demo](https://example.com/demo))."
        tags: [java, databases, systems]
        metrics: false

# --- Skills (rendered as-is; only list skills you genuinely have) ---
skills:
  languages: [Python, Java, SQL]
  frameworks: [Flask, React]
  tools: [Git, Docker, PostgreSQL]
