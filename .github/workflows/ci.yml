name: CI

# Lint + test on every push/PR. This is NOT the daily sourcing cron
# (that belongs to Phase 4); it only validates the codebase.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv (+ Python 3.12)
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest
      # End-to-end smoke: exercise every stage from bundled fixtures, zero live creds.
      - name: Dry run (all stages)
        run: uv run python -m internship_pipeline.run_daily --dry-run
