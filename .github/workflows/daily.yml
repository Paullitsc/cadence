name: Daily sourcing

# Phase 1 daily run: source + track internships, write the digest.
# 13:00 UTC ≈ early US morning. GitHub Actions cron is UTC-only, ≥5-min
# granularity, and can be delayed 10–30+ min at peak — all fine for a daily job.
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}        # allow manual runs from the Actions tab

permissions:
  contents: read

concurrency:
  group: daily-sourcing
  cancel-in-progress: false

jobs:
  source:
    runs-on: ubuntu-latest
    env:
      # Repo *variables* (Settings → Secrets and variables → Actions → Variables)
      # --- Phase 0/1: core + sourcing ---
      STORAGE_BACKEND: ${{ vars.STORAGE_BACKEND || 'supabase' }}
      ENABLE_JSEARCH: ${{ vars.ENABLE_JSEARCH || 'false' }}
      LOG_LEVEL: INFO
      # --- Phase 2: résumé matching / tailoring ---
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-haiku-4-5' }}
      ANTHROPIC_MAX_TOKENS: ${{ vars.ANTHROPIC_MAX_TOKENS || '2048' }}
      FIT_SCORE_THRESHOLD: ${{ vars.FIT_SCORE_THRESHOLD || '0.30' }}
      HIGH_PRIORITY_THRESHOLD: ${{ vars.HIGH_PRIORITY_THRESHOLD || '0.55' }}
      TOP_K_BULLETS: ${{ vars.TOP_K_BULLETS || '8' }}
      MAX_TAILORED_BULLETS: ${{ vars.MAX_TAILORED_BULLETS || '10' }}
      MAX_APPLICATIONS_PER_RUN: ${{ vars.MAX_APPLICATIONS_PER_RUN || '15' }}
      TARGET_COMPANIES: ${{ vars.TARGET_COMPANIES || '' }}
      # --- Phase 3: cold outreach (drafting only — sending is always manual) ---
      ENABLE_HUNTER: ${{ vars.ENABLE_HUNTER || 'false' }}
      ENABLE_APOLLO: ${{ vars.ENABLE_APOLLO || 'false' }}
      OUTREACH_MAX_LOOKUPS_PER_RUN: ${{ vars.OUTREACH_MAX_LOOKUPS_PER_RUN || '5' }}
      OUTREACH_PAID_LOOKUP_HIGH_PRIORITY_ONLY: ${{ vars.OUTREACH_PAID_LOOKUP_HIGH_PRIORITY_ONLY || 'true' }}
      OUTREACH_FROM_NAME: ${{ vars.OUTREACH_FROM_NAME || '' }}
      OUTREACH_FROM_EMAIL: ${{ vars.OUTREACH_FROM_EMAIL || '' }}
      OUTREACH_OPT_OUT: ${{ vars.OUTREACH_OPT_OUT || '' }}
      # --- Phase 4: dual-trigger, morning digest email, alerts ---
      FAVORABLE_RECENT_DAYS: ${{ vars.FAVORABLE_RECENT_DAYS || '7' }}
      DIGEST_TOP_N: ${{ vars.DIGEST_TOP_N || '10' }}
      DIGEST_EMAIL_ENABLED: ${{ vars.DIGEST_EMAIL_ENABLED || 'false' }}
      DIGEST_TO_EMAIL: ${{ vars.DIGEST_TO_EMAIL || '' }}
      REPLY_SCAN_DAYS: ${{ vars.REPLY_SCAN_DAYS || '14' }}
      ALERT_CHANNEL: ${{ vars.ALERT_CHANNEL || 'email' }}
      # Gmail authorized-user token (send + readonly). Written from a secret below; the
      # send path / reply scan degrade gracefully to no-ops if it's unset.
      GMAIL_OAUTH_TOKEN_JSON: gmail_token.json
      # Repo *secrets* (same page → Secrets). Unset ones are empty strings.
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
      APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
      # Real home address — technically only ends up in sent emails, but kept as a
      # secret for defense-in-depth (masked from logs). Note: sending itself is
      # ALWAYS a separate manual `approve-and-send` command; this only affects the
      # footer baked into drafts created by this workflow.
      OUTREACH_PHYSICAL_ADDRESS: ${{ secrets.OUTREACH_PHYSICAL_ADDRESS }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (+ Python 3.12)
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Install dependencies
        # gmail extra powers the digest email + the failure email alert (both optional).
        run: uv sync --extra dev --extra phase2 --extra gmail

      # Materialize the Gmail token from a secret (contents of the authorized-user JSON
      # minted locally via `python -m internship_pipeline.outreach.gmail_auth`). If the
      # secret is unset the file is empty and every Gmail path safely no-ops.
      - name: Write Gmail token
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: printf '%s' "$GMAIL_TOKEN_JSON" > gmail_token.json

      - name: Run daily pipeline
        run: uv run python -m internship_pipeline.run_daily

      - name: Upload digest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest
          path: data/digests/
          if-no-files-found: ignore

      # GitHub does NOT notify on scheduled-workflow failures — raise a real alert.
      # Chosen channel: email (Gmail). Best-effort: the alerts module never raises.
      - name: Alert on failure (email)
        if: failure()
        run: |
          uv run python -m internship_pipeline.alerts email \
            "Daily internship pipeline run FAILED — check the GitHub Actions logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
