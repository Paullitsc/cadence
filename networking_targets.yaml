# Networking campaign targets (Phase 6) — seeded from https://8vc.com/companies,
# verified against the live page 2026-07-15. The 10 companies 8VC marks "Exited"
# (incl. Palantir, Asana, Hims) are excluded — you can't intern at an exit.
#
# Schema (loaded by internship_pipeline/networking/targets.py):
#   campaign: short slug — prefixes every person id so a second campaign file
#       could coexist later without id collisions.
#   companies[]:
#     name (required)     display name
#     tier                1 = Seed/Series A (founders/CTOs are reachable),
#                         2 = Series B or unlabeled on 8VC's page,
#                         3 = Series C+/Growth (aim for recruiters/eng managers).
#                         The daily connect-draft budget is spent tier 1 first.
#     stage               8VC's own stage label (informational)
#     website / domain    company site; domain feeds the Phase-6b email lookup
#     company_linkedin    the company's LinkedIn page — where you find PEOPLE
#     blurb               8VC's own one-paragraph description — the only company
#                         facts the drafting step may use (anti-hallucination)
#     people[] (optional) who to contact; each entry becomes one networking row:
#       - name: Jane Doe
#         role: CTO                                  # optional
#         linkedin: https://linkedin.com/in/janedoe  # their profile (find by hand)
#         email: jane@example.com                    # optional; 6b can look it up
#
# A company with no people entry still gets ONE placeholder row — fill in the
# person on the sheet's Networking tab (or here) and the next daily run drafts
# the connect note. This file is yours: edit tiers/blurbs, delete companies,
# add people freely. Removing a company here never deletes its stored history.
# One rule: person ids are POSITIONAL — append new people at the END of a
# company's list and never reorder it, or rows would swap identities.

